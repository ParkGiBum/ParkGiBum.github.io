<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gibum Park - Gallery</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%231772d0'/><text x='50' y='72' font-size='62' font-family='Lato,Arial,sans-serif' font-weight='700' text-anchor='middle' fill='white'>G</text></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;0,900;1,400&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#1a1a1a;
    --muted:#5a5a5a;
    --faint:#888;
    --link:#1772d0;
    --line:#e6e6e6;
    --soft:#f4f5f7;
    --sans:"Lato","Noto Sans KR",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:#fff;color:var(--ink);
    font-family:var(--sans);font-size:16.5px;line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:820px;margin:0 auto;padding:54px 24px 80px;}
  a{color:var(--link);text-decoration:none;}
  a:hover{text-decoration:underline;}

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  h1 {font-size:30px;font-weight:900;letter-spacing:-.01em;}
  .back-btn {
    font-size: 15px;
    font-weight: 700;
    color: var(--muted);
  }
  
  hr{border:none;border-top:1px solid var(--line);margin:20px 0 30px;}

  /* ---- gallery ---- */
  .gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:10px;
  }
  .gallery a{
    display:block;aspect-ratio:1/1;overflow:hidden;
    border-radius:6px;border:1px solid var(--line);background:var(--soft);
  }
  .gallery img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s ease;}
  .gallery a:hover img{transform:scale(1.06);}

  @media (max-width:600px){
    .wrap{padding:40px 18px 64px;}
    .gallery{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>Gallery</h1>
    <a href="index.html" class="back-btn">← Back to Home</a>
  </div>
  
  <p style="color:var(--muted); font-size:15px;">A few photos I took for fun.</p>
  <hr>
