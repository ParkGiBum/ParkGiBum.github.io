<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gibum Park - Gallery</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%231772d0'/><text x='50' y='72' font-size='62' font-family='Lato,Arial,sans-serif' font-weight='700' text-anchor='middle' fill='white'>G</text></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;0,900;1,400&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#1a1a1a;
    --muted:#5a5a5a;
    --faint:#888;
    --link:#1772d0;
    --line:#e6e6e6;
    --soft:#f4f5f7;
    --sans:"Lato","Noto Sans KR",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:#fff;color:var(--ink);
    font-family:var(--sans);font-size:16.5px;line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:820px;margin:0 auto;padding:54px 24px 80px;}
  a{color:var(--link);text-decoration:none;}
  a:hover{text-decoration:underline;}

  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
  h1{font-size:30px;font-weight:900;letter-spacing:-.01em;}
  .back-btn{font-size:15px;font-weight:700;color:var(--muted);}
  hr{border:none;border-top:1px solid var(--line);margin:20px 0 30px;}

  .sort-bar{display:flex;gap:8px;margin-bottom:20px;}
  .sort-btn{
    font-size:13.5px;font-family:var(--sans);
    border:1px solid var(--line);background:var(--soft);
    padding:4px 12px;border-radius:20px;cursor:pointer;
    color:var(--muted);transition:all .15s;
  }
  .sort-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .sort-btn:hover:not(.active){background:#e2e8f0;}

  /* Masonry.js */
  .masonry{position:relative;}
  .masonry-sizer,
  .masonry-item{width:calc(33.333% - 6px);}
  .masonry-item{
    float:left;margin-bottom:8px;
    cursor:zoom-in;display:block;
    border-radius:6px;overflow:hidden;
    border:1px solid var(--line);background:var(--soft);
  }
  .masonry-item img{width:100%;height:auto;display:block;transition:transform .35s ease;}
  .masonry-item:hover img{transform:scale(1.04);}
  .masonry-item.wide{width:calc(66.666% - 3px);}

  /* Lightbox */
  .lightbox{
    display:none;position:fixed;z-index:9999;
    left:0;top:0;width:100%;height:100%;
    background:rgba(0,0,0,.92);
    align-items:center;justify-content:center;user-select:none;
  }
  .lightbox img{max-width:90%;max-height:90vh;border-radius:4px;object-fit:contain;}
  .lightbox-close{
    position:absolute;top:20px;right:30px;
    color:#fff;font-size:40px;font-weight:bold;cursor:pointer;transition:color .2s;
  }
  .lightbox-close:hover{color:#ccc;}
  .lightbox-prev,.lightbox-next{
    position:absolute;top:50%;transform:translateY(-50%);
    color:#fff;font-size:50px;font-weight:bold;
    cursor:pointer;padding:15px;transition:color .2s;
  }
  .lightbox-prev{left:20px;}
  .lightbox-next{right:20px;}
  .lightbox-prev:hover,.lightbox-next:hover{color:#ccc;}

  @media(max-width:600px){
    .wrap{padding:40px 18px 64px;}
    .masonry-sizer,.masonry-item{width:calc(50% - 4px);}
    .lightbox-prev,.lightbox-next{font-size:30px;padding:10px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>Gallery</h1>
    <a href="index.html" class="back-btn">← Back to Home</a>
  </div>

  <p style="color:var(--muted);font-size:15px;">A few photos I took for fun.</p>
  <hr>

  <div class="sort-bar">
    <button class="sort-btn active" data-mode="date">Recent first</button>
    <button class="sort-btn" data-mode="color">By color</button>
  </div>

  <div class="masonry" id="gallery-container">
    <div class="masonry-sizer"></div>
  </div>

</div>

<div id="lightbox" class="lightbox">
  <span class="lightbox-close">&times;</span>
  <span class="lightbox-prev">&#10094;</span>
  <img id="lightbox-img" src="">
  <span class="lightbox-next">&#10095;</span>
</div>

<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
<script src="gallery/output/order.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('gallery-container');
    const total = typeof GALLERY_TOTAL !== 'undefined' ? GALLERY_TOTAL : 100;
    const wideSet = typeof GALLERY_WIDE !== 'undefined' ? GALLERY_WIDE : new Set();
    const colorOrder = typeof GALLERY_COLOR_ORDER !== 'undefined' ? [...GALLERY_COLOR_ORDER].reverse() : null;
    const dateOrder = Array.from({length: total}, (_, i) => total - i);

    let msnry = new Masonry(container, {
      itemSelector: '.masonry-item',
      columnWidth: '.masonry-sizer',
      percentPosition: true,
      gutter: 8,
      transitionDuration: '0.2s'
    });

    function buildGallery(order) {
      // 기존 아이템 제거 (sizer 제외)
      const oldItems = container.querySelectorAll('.masonry-item');
      msnry.remove(oldItems);

      const newItems = [];
      order.forEach(n => {
        const a = document.createElement('a');
        a.className = 'masonry-item';
        a.href = encodeURI(`gallery/output/Photo ${n}.jpg`);

        const img = document.createElement('img');
        img.src = encodeURI(`gallery/output/thumb_Photo ${n}.jpg`);
        img.loading = 'lazy';
        img.alt = '';
        img.onerror = () => { msnry.remove([a]); msnry.layout(); };

        a.appendChild(img);
        container.appendChild(a);
        newItems.push(a);
      });

      msnry.appended(newItems);
      imagesLoaded(container, () => msnry.layout());
    }

    buildGallery(dateOrder);

    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        buildGallery(this.dataset.mode === 'color' && colorOrder ? colorOrder : dateOrder);
      });
    });

    // Lightbox
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    let currentIndex = 0;
    let currentLinks = [];

    container.addEventListener('click', function(e) {
      const clicked = e.target.closest('a');
      if (!clicked) return;
      e.preventDefault();
      currentLinks = Array.from(container.querySelectorAll('a'));
      currentIndex = currentLinks.indexOf(clicked);
      openLightbox();
    });

    function openLightbox() {
      lightboxImg.src = currentLinks[currentIndex].getAttribute('href');
      lightbox.style.display = 'flex';
    }
    function closeLightbox() { lightbox.style.display = 'none'; lightboxImg.src = ''; }
    function next() { currentIndex = (currentIndex + 1) % currentLinks.length; openLightbox(); }
    function prev() { currentIndex = (currentIndex - 1 + currentLinks.length) % currentLinks.length; openLightbox(); }

    document.querySelector('.lightbox-next').addEventListener('click', e => { e.stopPropagation(); next(); });
    document.querySelector('.lightbox-prev').addEventListener('click', e => { e.stopPropagation(); prev(); });
    document.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => {
      if (lightbox.style.display === 'flex') {
        if (e.key === 'ArrowRight') next();
        if (e.key === 'ArrowLeft') prev();
        if (e.key === 'Escape') closeLightbox();
      }
    });
  });
</script>
</body>
</html>
